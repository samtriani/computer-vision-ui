<section class="login-page">
  <form class="card login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="brand-mark">OSA</div>
    <p class="eyebrow">OSA Vision · La Comer</p>
    <h1>Iniciar sesión</h1>
    <p class="sub">Ingresa con tu usuario para ver las vistas de tu rol.</p>

    <div class="field">
      <label for="username">Usuario</label>
      <input id="username" type="text" formControlName="username" autocomplete="username" placeholder="tienda" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
    </div>

    <p class="error" *ngIf="error()">{{ error() }}</p>

    <button class="btn btn-primary btn-block" type="submit" [disabled]="form.invalid || enviando()">
      {{ enviando() ? 'Entrando…' : 'Entrar' }}
    </button>

    <div class="demo-hint">
      <p class="hint">Usuarios demo (PoC):</p>
      <button type="button" class="demo-chip" (click)="entrar('operativo', 'operativo123')">📷 operativo / operativo123</button>
      <button type="button" class="demo-chip" (click)="entrar('tienda', 'tienda123')">🏬 tienda / tienda123</button>
      <button type="button" class="demo-chip" (click)="entrar('ejecutivo', 'ejecutivo123')">📊 ejecutivo / ejecutivo123</button>
    </div>
  </form>
</section>
